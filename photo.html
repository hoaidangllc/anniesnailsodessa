<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Annie's Nails & Spa | Gallery</title>

<style>

body{
font-family:Arial,Helvetica,sans-serif;
background:#fafafa;
margin:0;
padding:20px;
text-align:center;
}

h1{
margin-top:10px;
}

p{
color:#666;
margin-bottom:25px;
}

.container{
max-width:900px;
margin:auto;
}

/* gallery grid */

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin-bottom:30px;
}

.gallery img{
width:100%;
height:200px;
object-fit:cover;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.15);
transition:transform .2s;
}

.gallery img:hover{
transform:scale(1.04);
}

/* buttons */

.btn{
display:block;
margin:10px auto;
padding:15px;
max-width:320px;
border-radius:10px;
color:white;
font-weight:bold;
text-decoration:none;
}

.btn.facebook{background:#1877F2;}
.btn.instagram{background:#E1306C;}
.btn.google{background:#4285F4;}

</style>

</head>

<body>

<div class="container">

<h1>Annie's Nails & Spa</h1>

<p>Browse our latest nail designs and salon photos.</p>

<div class="gallery">

<img src="https://images.unsplash.com/photo-1632345031435-8727f6897d53">
<img src="https://images.unsplash.com/photo-1604654894610-df63bc536371">
<img src="https://images.unsplash.com/photo-1519014816548-bf5fe059798b">
<img src="https://images.unsplash.com/photo-1596704017254-975b52f79f04">
<img src="https://images.unsplash.com/photo-1589712235279-947e4d2f84d6">
<img src="https://images.unsplash.com/photo-1620331311520-246422fd82f9">

</div>

<a class="btn facebook"
href="https://www.facebook.com/nailodessa/photos"
target="_blank">

View More Photos on Facebook

</a>

<a class="btn instagram"
href="https://www.instagram.com/anniesnailsodessa"
target="_blank">

View Instagram Gallery

</a>

<a class="btn google"
href="https://www.google.com/maps/place/Annie's+Nails+%26+Spa/@31.8745932,-102.3481688"
target="_blank">

View Google Photos

</a>

</div>

</body>
</html>
